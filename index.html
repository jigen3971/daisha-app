<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>代車貸出確認アプリ</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <h1>代車貸出確認</h1>

  <h2>お客様情報</h2>

  <input type="text" placeholder="氏名">
  <input type="tel" placeholder="TEL">
  <input type="text" placeholder="住所">

  <h2>車両情報</h2>

  <input type="text" placeholder="車種">
  <input type="text" placeholder="ナンバー">
  <input type="text" placeholder="色">

  <h2>貸出内容</h2>

  <label>貸出理由</label>

  <select>
    <option>車検</option>
    <option>修理</option>
    <option>板金</option>
    <option>代車</option>
    <option>その他</option>
  </select>

  <label>使用開始日時</label>
  <input type="datetime-local">

  <label>返却予定日時</label>
  <input type="datetime-local">

  <label>走行距離</label>
  <input type="number" placeholder="km">

  <h2>確認事項</h2>

  <div class="check">
    <input type="checkbox">
    <label>
      【1】自動車保険の確認<br>
      当社の代車には任意保険が付保されていない場合があります。事故時は乙の保険で対応するものとし、無保険の場合は貸出できません。
    </label>
  </div>

  <div class="check">
    <input type="checkbox">
    <label>
      【2】交通違反について<br>
      駐車違反等を含む交通違反は乙の責任で処理し、反則金の支払いおよび警察対応を行うものとします。
    </label>
  </div>

  <div class="check">
    <input type="checkbox">
    <label>
      【3】使用者の限定<br>
      代車の使用は本人のみとし、第三者への貸与（又貸し）は一切禁止します。違反時の責任は全て乙が負います。
    </label>
  </div>

  <div class="check">
    <input type="checkbox">
    <label>
      【4】事故・損害の責任<br>
      事故・故障・損傷について甲は一切責任を負いません。修理費・レッカー費・休業損害等は乙の負担とします。
    </label>
  </div>

  <div class="check">
    <input type="checkbox">
    <label>
      【5】鍵の紛失<br>
      鍵紛失時は鍵作成・交換費用として金100,000円を請求します。
    </label>
  </div>

  <div class="check">
    <input type="checkbox">
    <label>
      【6】燃料<br>
      燃料は満タン返却とします。未給油の場合は燃料代および手数料を請求します。
    </label>
  </div>

  <div class="check">
    <input type="checkbox">
    <label>
      【7】禁煙・電子タバコ禁止<br>
      全車禁煙とし、電子タバコを含め一切の喫煙を禁止します。違反または臭い残存時は室内消臭・ルームクリーニング費用として金25,000円を請求します。
    </label>
  </div>

  <div class="check">
    <input type="checkbox">
    <label>
      【8】ペット・臭気物禁止<br>
      ペット同乗および強い臭気物の持込みは禁止とし、違反時はクリーニング費用を請求します。
    </label>
  </div>

  <div class="check">
    <input type="checkbox">
    <label>
      【9】日常点検義務<br>
      オイル・冷却水等の点検不足による故障は乙の負担とします。
    </label>
  </div>

  <div class="check">
    <input type="checkbox">
    <label>
      【10】用途制限<br>
      違法行為・過積載・改造等は禁止とし、違反時の損害は乙が負担します。
    </label>
  </div>

  <div class="check">
    <input type="checkbox">
    <label>
      【11】返却義務<br>
      指定日時までに返却するものとし、遅延時は追加料金を請求します。
    </label>
  </div>

  <div class="check">
    <input type="checkbox">
    <label>
      【12】損傷・汚損<br>
      返却時の新たな傷・汚れは修理費および損料金を請求します。
    </label>
  </div>

  <h2>貸出担当者</h2>

  <h2>貸出前写真</h2>
  <input type="text" id="staff" placeholder="担当者名">

<label>前方写真</label>
<input type="file" accept="image/*"  capture="environment">

<label>後方写真</label>
<input type="file" accept="image/*"  capture="environment">

<label>左側写真</label>
<input type="file" accept="image/*" capture="environment">

<label>右側写真</label>
<input type="file" accept="image/*" capture="environment">

<label>フロントガラス</label>
<input type="file" accept="image/*" capture="environment">

<label>車内写真</label>
<input type="file" accept="image/*" capture="environment">

  <h2>署名</h2>
  <input type="text" id="sign" placeholder="署名">

<h2>返却確認</h2>

<div class="check">
  <input type="checkbox">
  <label>燃料満タン確認</label>
</div>

<div class="check">
  <input type="checkbox">
  <label>タバコ臭なし</label>
</div>

<div class="check">
  <input type="checkbox">
  <label>ペット臭・異臭なし</label>
</div>

<div class="check">
  <input type="checkbox">
  <label>フロントガラス飛び石なし</label>
</div>

<div class="check">
  <input type="checkbox">
  <label>新しい傷なし</label>
</div>

<div class="check">
  <input type="checkbox">
  <label>車内汚れなし</label>
</div>

<label>返却時走行距離</label>
<input type="number" placeholder="km">

<button>確認しました</button>

  <p id="message"></p>

</div>

<script src="script.js"></script>

</body>
</html>
