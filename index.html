<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>代車管理アプリ</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <h1>代車管理アプリ</h1>
  <p class="lead">誰に・どの代車を・いつ貸したかを記録します</p>

  <h2>貸出代車</h2>

  <label>代車を選択</label>
  <select id="rentalCar">
    <option value="">代車を選択してください</option>
    <option>代車1　ワゴンR　郡山〇〇 あ12-34</option>
    <option>代車2　ムーヴ　郡山〇〇 い56-78</option>
    <option>代車3　アルト　郡山〇〇 う90-12</option>
    <option>代車4　ミライース　郡山〇〇 え34-56</option>
    <option>代車5　タント　郡山〇〇 お78-90</option>
    <option>代車6　N-BOX　郡山〇〇 か11-22</option>
    <option>代車7　スペーシア　郡山〇〇 き33-44</option>
    <option>代車8　ハイゼット　郡山〇〇 く55-66</option>
    <option>代車9　エブリイ　郡山〇〇 け77-88</option>
    <option>代車10　アクア　郡山〇〇 こ99-00</option>
    <option>代車11　フィット　郡山〇〇 さ12-34</option>
    <option>代車12　ノート　郡山〇〇 し56-78</option>
    <option>代車13　軽トラック　郡山〇〇 す90-12</option>
    <option>代車14　軽バン　郡山〇〇 せ34-56</option>
    <option>代車15　その他　郡山〇〇 そ78-90</option>
  </select>

  <h2>お客様情報</h2>

  <input type="text" placeholder="氏名" autocomplete="off">
  <input type="tel" placeholder="TEL" autocomplete="off">
  <input type="text" placeholder="住所" autocomplete="off">

  <h2>お預かり車</h2>

  <input type="text" placeholder="預かり車 車種" autocomplete="off">
  <input type="text" placeholder="預かり車 ナンバー" autocomplete="off">

  <label>お預かり車の写真</label>
  <input type="file" accept="image/*" capture="environment">

  <h2>貸出内容</h2>

  <label>貸出理由</label>
  <select id="reason">
    <option>車検</option>
    <option>修理</option>
    <option>板金</option>
    <option>事故対応</option>
    <option>その他</option>
  </select>

  <label>貸出日時</label>
  <input type="datetime-local">

  <label>返却予定日時</label>
  <input type="datetime-local">

  <label>貸出時走行距離</label>
  <input type="number" placeholder="km">

  <h2>確認事項</h2>

  <div class="check">
    <input type="checkbox">
    <label>任意保険加入状況を確認しました</label>
  </div>

  <div class="check">
    <input type="checkbox">
    <label>交通違反はお客様責任で処理します</label>
  </div>

  <div class="check">
    <input type="checkbox">
    <label>第三者への貸与は禁止します</label>
  </div>

  <div class="check">
    <input type="checkbox">
    <label>事故・損傷・故障時はお客様負担となる場合があります</label>
  </div>

  <div class="check">
    <input type="checkbox">
    <label>鍵紛失時は交換費用をご請求します</label>
  </div>

  <div class="check">
    <input type="checkbox">
    <label>燃料は満タン返却です</label>
  </div>

  <div class="check">
    <input type="checkbox">
    <label>禁煙・電子タバコ禁止です</label>
  </div>

  <div class="check">
    <input type="checkbox">
    <label>ペット同乗・臭気物の持ち込みは禁止です</label>
  </div>

  <div class="check">
    <input type="checkbox">
    <label>返却時の新たな傷・汚損は修理費・清掃費をご請求する場合があります</label>
  </div>

  <h2>貸出担当者</h2>
  <input type="text" id="staff" placeholder="担当者名" autocomplete="off">

  <h2>署名</h2>
  <input type="text" id="sign" placeholder="署名" autocomplete="off">

  <button class="rent-btn">貸出確認完了</button>

  <hr>

  <h1 class="return-title">返却時確認</h1>

  <div class="check">
    <input type="checkbox">
    <label>燃料満タン確認</label>
  </div>

  <div class="check">
    <input type="checkbox">
    <label>タバコ臭なし</label>
  </div>

  <div class="check">
    <input type="checkbox">
    <label>ペット臭・異臭なし</label>
  </div>

  <div class="check">
    <input type="checkbox">
    <label>フロントガラス飛び石なし</label>
  </div>

  <div class="check">
    <input type="checkbox">
    <label>新しい傷なし</label>
  </div>

  <div class="check">
    <input type="checkbox">
    <label>車内汚れなし</label>
  </div>

  <label>返却時走行距離</label>
  <input type="number" placeholder="km">

  <button class="return-btn">返却確認完了</button>

  <p id="message"></p>

</div>

<script src="script.js"></script>

</body>
</html>
